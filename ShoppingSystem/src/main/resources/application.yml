spring:
  application:
    name: ShoppingSystem
  mail:
    host: smtp.qq.com
    port: 465
    username: yu-xingyou@foxmail.com
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          ssl:
            enable: true
          auth: true


  datasource:
    url: jdbc:mysql://localhost:3306/shopping_system
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
      enabled: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

logging:
  level:
    root: WARN
    com.xingyou: INFO
    com.xingyou.controller: DEBUG
    com.xingyou.service: DEBUG
    com.xingyou.mapper: DEBUG
    org.springframework.web: WARN
    org.apache.catalina: WARN
    org.apache.ibatis: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/shopping-system.log
    max-size: 10MB
    max-history: 30

server:
  port: 8080

jwt:
  signKey: ${JWT_SECRET_KEY}
  expire: 43200000

aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucketName: shopping-exam
    region: cn-beijing

